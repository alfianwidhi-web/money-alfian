<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Money Alfian</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Outfit', 'sans-serif'] },
                    colors: { brand: { 500: '#6366f1', 600: '#4f46e5', 700: '#4338ca' } }
                }
            }
        }
    </script>
    <style>
        .fade-in { animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .spinner { animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">

   <div class="bg-white rounded-3xl shadow-2xl overflow-hidden w-full max-w-4xl flex flex-col md:flex-row h-[600px] fade-in">
        
        <div class="hidden md:flex flex-col justify-center items-center w-1/2 bg-gradient-to-br from-brand-600 to-purple-600 text-white p-10 relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-full bg-white opacity-10" style="background-image: radial-gradient(#ffffff 2px, transparent 2px); background-size: 30px 30px;"></div>
            <div class="relative z-10 text-center">
                <div class="w-20 h-20 bg-white/20 rounded-2xl flex items-center justify-center text-3xl mb-6 mx-auto backdrop-blur-sm shadow-lg">
                    <i class="fa-solid fa-wallet"></i>
                </div>
                <h1 class="text-3xl font-bold mb-2">Money Alfian</h1>
                <p class="text-indigo-100 text-sm">Kelola keuanganmu dengan cerdas & mudah.</p>
            </div>
            <div class="absolute -bottom-10 -right-10 w-40 h-40 bg-purple-500 rounded-full blur-3xl opacity-50"></div>
            <div class="absolute -top-10 -left-10 w-40 h-40 bg-indigo-400 rounded-full blur-3xl opacity-50"></div>
        </div>

        <div class="w-full md:w-1/2 p-8 md:p-12 relative flex flex-col justify-center">
            
            <div id="loginSection" class="w-full">
                <h2 class="text-2xl font-bold text-slate-800 mb-1">Selamat Datang! 👋</h2>
                <p class="text-slate-400 text-sm mb-8">Silakan masuk ke akun Anda.</p>
                
                <form onsubmit="handleLogin(event)" class="space-y-5">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Username</label>
                        <div class="relative">
                            <i class="fa-solid fa-user absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                            <input type="text" id="loginUser" class="w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:border-brand-500 focus:ring-1 focus:ring-brand-500 transition" placeholder="Masukkan username" required>
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Password</label>
                        <div class="relative">
                            <i class="fa-solid fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                            <input type="password" id="loginPass" class="w-full pl-10 pr-10 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:border-brand-500 focus:ring-1 focus:ring-brand-500 transition" placeholder="••••••••" required>
                            <i onclick="togglePass('loginPass')" class="fa-solid fa-eye absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 cursor-pointer hover:text-brand-600"></i>
                        </div>
                    </div>
                    
                    <p id="loginError" class="text-red-500 text-xs hidden text-center"><i class="fa-solid fa-circle-exclamation mr-1"></i> Username atau password salah!</p>

                    <button type="submit" class="w-full bg-brand-600 hover:bg-brand-700 text-white font-bold py-3.5 rounded-xl shadow-lg shadow-brand-500/30 transition transform active:scale-95">
                        Masuk Sekarang
                    </button>
                </form>

                <p class="mt-8 text-center text-sm text-slate-500">
                    Belum punya akun? 
                    <button onclick="switchMode('register')" class="text-brand-600 font-bold hover:underline">Daftar dulu</button>
                </p>
            </div>

            <div id="registerSection" class="w-full hidden fade-in">
                <h2 class="text-2xl font-bold text-slate-800 mb-1">Buat Akun Baru 🚀</h2>
                <p class="text-slate-400 text-sm mb-8">Isi data di bawah untuk bergabung.</p>
                
                <form onsubmit="handleRegister(event)" class="space-y-5">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Username Baru</label>
                        <div class="relative">
                            <i class="fa-solid fa-user-plus absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                            <input type="text" id="regUser" class="w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:border-brand-500 focus:ring-1 focus:ring-brand-500 transition" placeholder="Buat username unik" required>
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Password</label>
                        <div class="relative">
                            <i class="fa-solid fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                            <input type="password" id="regPass" class="w-full pl-10 pr-10 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:border-brand-500 focus:ring-1 focus:ring-brand-500 transition" placeholder="••••••••" required>
                            <i onclick="togglePass('regPass')" class="fa-solid fa-eye absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 cursor-pointer hover:text-brand-600"></i>
                        </div>
                    </div>

                    <p id="regError" class="text-red-500 text-xs hidden text-center"></p>
                    <p id="regSuccess" class="text-green-600 text-xs hidden text-center font-bold"><i class="fa-solid fa-check-circle mr-1"></i> Akun berhasil dibuat! Silakan login.</p>

                    <button type="submit" class="w-full bg-slate-800 hover:bg-slate-900 text-white font-bold py-3.5 rounded-xl shadow-lg transition transform active:scale-95">
                        Daftar Akun
                    </button>
                </form>

                <p class="mt-8 text-center text-sm text-slate-500">
                    Sudah punya akun? 
                    <button onclick="switchMode('login')" class="text-brand-600 font-bold hover:underline">Login disini</button>
                </p>
            </div>

        </div>
    </div>

    <script>
    // ================================================================
    // FIREBASE CONFIG - Ganti FIREBASE_URL dengan URL database Anda
    // Harus SAMA PERSIS dengan yang ada di index.html
    // ================================================================
    const FIREBASE_URL = "GANTI_DENGAN_URL_FIREBASE_ANDA";

    const isCloudReady = FIREBASE_URL !== "GANTI_DENGAN_URL_FIREBASE_ANDA" && FIREBASE_URL.startsWith("https://");

    // Tampilkan status koneksi
    const statusEl = document.getElementById('cloudStatus');
    if (isCloudReady) {
        statusEl.innerHTML = '<i class="fa-solid fa-cloud text-green-500"></i><span class="text-green-600 font-semibold ml-1">Cloud aktif — akun tersinkronisasi lintas perangkat</span>';
        statusEl.classList.add('bg-green-50');
        statusEl.classList.remove('bg-slate-50');
    } else {
        statusEl.innerHTML = '<i class="fa-solid fa-triangle-exclamation text-amber-500"></i><span class="text-amber-600 ml-1">Mode lokal — akun hanya tersimpan di perangkat ini</span>';
        statusEl.classList.add('bg-amber-50');
        statusEl.classList.remove('bg-slate-50');
    }

    // ================================================================
    // HELPER: Sanitasi username untuk dijadikan key Firebase
    // ================================================================
    function safeKey(username) {
        return username.toLowerCase().replace(/[^a-z0-9]/g, '_');
    }

    // ================================================================
    // CLOUD FUNCTIONS - Simpan & Ambil Akun User
    // ================================================================
    async function saveUserCloud(username, data) {
        if (!isCloudReady) return false;
        try {
            const res = await fetch(`${FIREBASE_URL}/accounts/${safeKey(username)}.json`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            return res.ok;
        } catch(e) { return false; }
    }

    async function getUserCloud(username) {
        if (!isCloudReady) return null;
        try {
            const res = await fetch(`${FIREBASE_URL}/accounts/${safeKey(username)}.json`);
            if (!res.ok) return null;
            const data = await res.json();
            // Firebase returns null (as JSON null) jika tidak ada
            return data;
        } catch(e) { return null; }
    }

    // ================================================================
    // UI HELPERS
    // ================================================================
    function switchMode(mode) {
        document.querySelectorAll('input').forEach(i => i.value = '');
        document.getElementById('loginError').classList.add('hidden');
        document.getElementById('regError').classList.add('hidden');
        document.getElementById('regSuccess').classList.add('hidden');
        if (mode === 'register') {
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('registerSection').classList.remove('hidden');
        } else {
            document.getElementById('registerSection').classList.add('hidden');
            document.getElementById('loginSection').classList.remove('hidden');
        }
    }

    function togglePass(id) {
        const el = document.getElementById(id);
        el.type = el.type === 'password' ? 'text' : 'password';
    }

    function setBtnLoading(id, isLoading, label) {
        const btn = document.getElementById(id);
        btn.disabled = isLoading;
        btn.innerHTML = isLoading
            ? `<i class="fa-solid fa-circle-notch spinner mr-2"></i>${label}`
            : label;
    }

    // ================================================================
    // LOCAL STORAGE HELPERS
    // ================================================================
    function getLocalUsers() {
        return JSON.parse(localStorage.getItem('mj_users')) || [];
    }

    function saveLocalUser(userData) {
        const users = getLocalUsers();
        const idx = users.findIndex(u => u.username.toLowerCase() === userData.username.toLowerCase());
        if (idx === -1) users.push(userData);
        else users[idx] = userData;
        localStorage.setItem('mj_users', JSON.stringify(users));
    }

    // ================================================================
    // REGISTER
    // ================================================================
    async function handleRegister(e) {
        e.preventDefault();
        const username = document.getElementById('regUser').value.trim();
        const password = document.getElementById('regPass').value.trim();
        const errEl = document.getElementById('regError');
        const okEl  = document.getElementById('regSuccess');

        errEl.classList.add('hidden');
        okEl.classList.add('hidden');

        // Validasi input
        if (username.length < 3) {
            errEl.innerText = "Username minimal 3 karakter!";
            errEl.classList.remove('hidden');
            return;
        }
        if (password.length < 4) {
            errEl.innerText = "Password minimal 4 karakter!";
            errEl.classList.remove('hidden');
            return;
        }

        setBtnLoading('regBtn', true, 'Mendaftar...');

        // Cek apakah username sudah ada
        const existsCloud = await getUserCloud(username);
        const localUsers  = getLocalUsers();
        const existsLocal = localUsers.some(u => u.username.toLowerCase() === username.toLowerCase());

        if (existsCloud !== null || existsLocal) {
            errEl.innerText = "Username sudah dipakai! Coba username lain.";
            errEl.classList.remove('hidden');
            setBtnLoading('regBtn', false, 'Daftar Akun');
            return;
        }

        // Buat akun baru
        const userData = {
            username: username,
            password: password,
            createdAt: new Date().toISOString()
        };

        // Simpan ke cloud + lokal bersamaan
        await saveUserCloud(username, userData);
        saveLocalUser(userData);

        setBtnLoading('regBtn', false, 'Daftar Akun');
        okEl.classList.remove('hidden');
        setTimeout(() => switchMode('login'), 1500);
    }

    // ================================================================
    // LOGIN
    // ================================================================
    async function handleLogin(e) {
        e.preventDefault();
        const username = document.getElementById('loginUser').value.trim();
        const password = document.getElementById('loginPass').value.trim();
        const errEl    = document.getElementById('loginError');
        const errMsgEl = document.getElementById('loginErrorMsg');

        errEl.classList.add('hidden');
        setBtnLoading('loginBtn', true, 'Memeriksa akun...');

        let validUser = null;

        // STEP 1: Cek dari cloud (sumber utama)
        if (isCloudReady) {
            const cloudUser = await getUserCloud(username);
            if (cloudUser && cloudUser.password === password) {
                validUser = cloudUser;
                // Sinkronisasi ke lokal supaya bisa offline
                saveLocalUser(cloudUser);
            }
        }

        // STEP 2: Fallback ke localStorage (jika offline / cloud belum setup)
        if (!validUser) {
            const localUsers = getLocalUsers();
            const found = localUsers.find(u =>
                u.username.toLowerCase() === username.toLowerCase() && u.password === password
            );
            if (found) {
                validUser = found;
                // Jika cloud aktif tapi tidak ditemukan di cloud, push ke cloud
                if (isCloudReady) saveUserCloud(found.username, found);
            }
        }

        setBtnLoading('loginBtn', false, 'Masuk Sekarang');

        if (validUser) {
            // Login berhasil
            localStorage.setItem('isLoggedIn', 'true');
            localStorage.setItem('userName', validUser.username);

            const btn = document.getElementById('loginBtn');
            btn.innerHTML = '<i class="fa-solid fa-check mr-2"></i> Berhasil masuk!';
            btn.classList.remove('bg-brand-600', 'hover:bg-brand-700');
            btn.classList.add('bg-green-500');

            setTimeout(() => { window.location.href = 'index.html'; }, 700);
        } else {
            // Login gagal
            if (isCloudReady) {
                errMsgEl.innerText = "Username atau password salah!";
            } else {
                errMsgEl.innerText = "Username atau password salah! Pastikan Anda sudah daftar di perangkat ini.";
            }
            errEl.classList.remove('hidden');
        }
    }
    </script>
</body>
</html>
